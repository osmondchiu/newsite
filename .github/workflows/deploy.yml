name: Deploy site

on:
  push:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "**.bib"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "Gemfile"
      - "Gemfile.lock"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/broken-links.yml"
      - "!.github/workflows/deploy-docker-tag.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!.github/workflows/docker-slim.yml"
      - "!.github/workflows/lighthouse-badger.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"
      - "!docs/CONTRIBUTING.md"
      - "!docs/CUSTOMIZE.md"
      - "!docs/FAQ.md"
      - "!docs/INSTALL.md"
      - "!README.md"
  pull_request:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "**.bib"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "Gemfile"
      - "Gemfile.lock"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/broken-links.yml"
      - "!.github/workflows/deploy-docker-tag.yml"
      - "!.github/workflows/deploy-image.yml"
      - "!.github/workflows/docker-slim.yml"
      - "!.github/workflows/lighthouse-badger.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"
      - "!docs/CONTRIBUTING.md"
      - "!docs/CUSTOMIZE.md"
      - "!docs/FAQ.md"
      - "!docs/INSTALL.md"
      - "!README.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    # available images: https://github.com/actions/runner-images#available-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
      - name: Setup Ruby 💎
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-version: "4.0.6"
          bundler-cache: true
      - name: Setup Python 🐍
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip" # caching pip dependencies
      - name: Setup Node 🧰
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - name: Install JS deps 📦
        run: npm ci
      - name: Update _config.yml ⚙️
        uses: fjogeleit/yaml-update-action@main
        with:
          commitChange: false
          valueFile: "_config.yml"
          propertyPath: "giscus.repo"
          value: ${{ github.repository }}
      - name: Install and Build 🔧
        run: |
          set -euo pipefail

          # Install OS packages required to build native gems
          sudo apt-get update
          sudo apt-get install -y imagemagick build-essential libssl-dev zlib1g-dev libxml2-dev libxslt1-dev libffi-dev pkg-config

          pip3 install --upgrade nbconvert

          # Determine Bundler version from Gemfile.lock if present
          BUNDLER_VERSION=""
          if [ -f Gemfile.lock ]; then
            BUNDLER_VERSION=$(awk '/^BUNDLED WITH/{getline; print $1; exit}' Gemfile.lock || true)
          fi
          # Default to the bundler version recorded in the lockfile (4.0.6) if detection fails
          BUNDLER_VERSION=${BUNDLER_VERSION:-"4.0.6"}
          echo "Using bundler version: $BUNDLER_VERSION"

          # Remove unnecessary platforms and keep only x86_64-linux-gnu for this runner
          bundle lock --remove-platform aarch64-linux-gnu aarch64-linux-musl arm-linux-gnu arm-linux-gnueabihf arm-linux-musl arm-linux-musleabihf arm64-darwin x86_64-darwin x86_64-linux-musl || true
          bundle lock --add-platform x86_64-linux-gnu || true

          # Configure bundler to install into vendor/bundle and skip dev/test groups
          bundle config set --local path 'vendor/bundle'
          bundle config set --local without 'development test'

          # Install gems (verbose for diagnostic)
          if ! bundle install --jobs 4 --retry 3 --path vendor/bundle --verbose; then
            echo "=== BUNDLE INSTALL FAILED: printing diagnostics ==="
            echo "=== Gemfile.lock (tail): ==="
            tail -n 200 Gemfile.lock || true
            echo "=== bundle env ==="
            bundle env || true
            echo "=== gem list (first 200 lines) ==="
            gem list | head -n 200 || true
            exit 1
          fi

          export JEKYLL_ENV=production
          bundle exec jekyll build
      - name: Purge unused CSS 🧹
        run: |
          npm install -g purgecss
          purgecss -c purgecss.config.js
      - name: Deploy 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
